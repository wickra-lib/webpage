<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="hg2" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hg3" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="10" y="40" width="380" height="240" rx="18" fill="white" fill-opacity="0.04" stroke="url(#hg)" stroke-opacity="0.35" stroke-width="1"/>

  <!-- grid -->
  <g stroke="#94a3b8" stroke-opacity="0.18" stroke-width="0.8">
    <line x1="10" y1="100" x2="390" y2="100"/>
    <line x1="10" y1="160" x2="390" y2="160"/>
    <line x1="10" y1="220" x2="390" y2="220"/>
  </g>

  <!-- price candles -->
  <g>
    <path d="M30 230 L50 200 L70 215 L90 170 L110 190 L130 150 L150 170 L170 110 L190 140 L210 95 L230 130 L250 105 L270 80 L290 120 L310 95 L330 75 L350 100 L370 70 Z" fill="url(#hg2)"/>
    <path d="M30 230 L50 200 L70 215 L90 170 L110 190 L130 150 L150 170 L170 110 L190 140 L210 95 L230 130 L250 105 L270 80 L290 120 L310 95 L330 75 L350 100 L370 70" stroke="#0ea5e9" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- indicator overlay -->
  <g>
    <path d="M30 220 L50 210 L70 205 L90 190 L110 185 L130 170 L150 165 L170 140 L190 135 L210 120 L230 115 L250 105 L270 95 L290 100 L310 95 L330 85 L350 88 L370 78" stroke="url(#hg)" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="0"/>
  </g>

  <!-- highlight dots -->
  <circle cx="170" cy="110" r="4" fill="#f97316"/>
  <circle cx="210" cy="95"  r="4" fill="#0ea5e9"/>
  <circle cx="330" cy="75"  r="4" fill="#f97316"/>
  <circle cx="370" cy="70"  r="4" fill="#0ea5e9"/>

  <!-- small label badges -->
  <g transform="translate(248,16)">
    <rect x="0" y="0" width="142" height="22" rx="11" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-opacity="0.4"/>
    <text x="14" y="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#0ea5e9">214 indicators · O(1)</text>
  </g>
</svg>
